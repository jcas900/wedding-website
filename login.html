<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Welcome - Amanda & Jordan's Wedding</title>
    <meta name="description" content="Welcome to Amanda & Jordan's wedding website." />
    <meta name="robots" content="noindex" />
    <meta name="theme-color" content="#e8eef4" />
    <link rel="icon" href="favicon.ico" sizes="48x48" />
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="apple-touch-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500&display=swap" />
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="login-container">
        <h1 class="hero-names">
            <span class="name">Amanda</span>
            <span class="and">&amp;</span>
            <span class="name">Jordan's</span>
            <span class="name">Wedding</span>
        </h1>
        <form class="login-form" id="login-form" novalidate>
            <label for="password" class="sr-only">Password</label>
            <input type="password" id="password" placeholder="Enter Password" autocomplete="off" enterkeyhint="go" autofocus />
            <button class="book-hotel-button" id="login-submit" type="submit">Enter Site</button>
            <p id="error-message" class="error-message">Incorrect password.</p>
        </form>
    </div>
    <script>
        var passwordInput = document.getElementById('password');
        var errorMessage = document.getElementById('error-message');

        // Where to send the guest after login: the page they originally asked for
        // (saved by the auth guard before redirecting here), or the homepage.
        function postLoginTarget() {
            var target = 'index.html';
            try {
                var stored = sessionStorage.getItem('postLoginRedirect');
                // only accept same-site relative paths like "/bus-rsvp.html"
                if (stored && stored.charAt(0) === '/' && stored.charAt(1) !== '/') {
                    target = stored;
                }
                sessionStorage.removeItem('postLoginRedirect');
            } catch (e) {}
            return target;
        }

        // Already authenticated? Skip straight to the site.
        if (localStorage.getItem('isAuthenticated')) {
            location.replace(postLoginTarget());
        }

        document.getElementById('login-form').addEventListener('submit', function (e) {
            e.preventDefault();
            if (passwordInput.value === "101726") {
                localStorage.setItem('isAuthenticated', 'true');
                location.replace(postLoginTarget());
            } else {
                errorMessage.style.display = 'block';
                passwordInput.value = '';
                passwordInput.focus();
            }
        });

        // Hide the error once the guest starts typing again
        passwordInput.addEventListener('input', function () {
            errorMessage.style.display = 'none';
        });
    </script>
</body>
</html>

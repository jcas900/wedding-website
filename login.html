<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Welcome - Amanda & Jordan's Wedding</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="login-container">
        <h1 class="hero-names">
            <span class="name">Amanda</span>
            <span class="and">&amp;</span>
            <span class="name">Jordan's</span>
            <span class="name">Wedding</span>
        </h1>
        <div class="login-form">
            <label for="password" class="sr-only">Password</label>
            <input type="password" id="password" placeholder="Enter Password" />
            <button class="book-hotel-button" id="login-submit">Enter Site</button>
            <p id="error-message" class="error-message">Incorrect password.</p>
        </div>
    </div>
    <script>
        function checkPassword() {
            const password = document.getElementById('password').value;
            if (password === "101726") {
                localStorage.setItem('isAuthenticated', 'true');
                window.location.href = 'index.html';
            } else {
                document.getElementById('error-message').style.display = 'block';
                document.getElementById('password').value = '';
            }
        }

        document.getElementById('login-submit').addEventListener('click', checkPassword);
        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                checkPassword();
            }
        });

        // Redirect to login if not authenticated
        if (window.location.pathname.indexOf('login.html') === -1) {
            if (!localStorage.getItem('isAuthenticated')) {
                window.location.href = 'login.html';
            }
        }
    </script>
</body>
</html>

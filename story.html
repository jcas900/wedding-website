<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Gallery - Amanda & Jordan's Wedding</title>
  <meta name="description" content="Photos of Amanda & Jordan — from their first Hinge conversation to the engagement." />
  <meta name="robots" content="noindex" />
  <meta name="theme-color" content="#e8eef4" />
  <link rel="icon" href="favicon.ico" sizes="48x48" />
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <script>if (!localStorage.getItem('isAuthenticated')) { try { sessionStorage.setItem('postLoginRedirect', location.pathname + location.search); } catch (e) {} location.replace('login.html'); }</script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500&display=swap" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <nav></nav>
  <button class="menu-toggle" aria-label="Menu" aria-expanded="false">☰</button>
  <div class="content-wrapper">
    <main>
      <!-- Replaced previous story hero and caption: gallery now replaces the existing content -->

      <!-- Gallery section: populated by gallery.js -->
      <section id="home-gallery" class="gallery-section" aria-label="Gallery">
        <div id="gallery-grid" class="gallery-grid">
          <figure class="gallery-item featured">
            <img src="images/gallery/our-story.jpg" alt="Our first Hinge conversation" data-caption="Our first Hinge conversation" loading="lazy">
          </figure>
          <!-- Other images appended by gallery.js -->
        </div>
      </section>

      <!-- Lightbox overlay (hidden by default) -->
      <div id="lightbox" class="lightbox" role="dialog" aria-modal="true" aria-hidden="true">
        <button class="lightbox-close" aria-label="Close (Esc)">&times;</button>
        <button class="lightbox-prev" aria-label="Previous image">‹</button>
        <div class="lightbox-content">
          <img id="lightbox-image" src="" alt="" />
          <p id="lightbox-caption" class="lightbox-caption"></p>
        </div>
        <button class="lightbox-next" aria-label="Next image">›</button>
      </div>

    </main>
  </div>
  <script src="script.js" defer></script>
  <script src="gallery.js" defer></script>
</body>
</html>
